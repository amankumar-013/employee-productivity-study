<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Productivity Study</title>
    <!-- Links to your external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Employee Productivity Tracker</h1>

    <div class="container">
        <!-- Input Form Section -->
        <div class="card">
            <h2>Log a Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskName">Task Description:</label>
                    <input type="text" id="taskName" required placeholder="e.g., Data Entry, Market Research">
                </div>
                
                <div class="form-group">
                    <label for="hoursSpent">Hours Spent:</label>
                    <input type="number" id="hoursSpent" required min="0.5" step="0.5" placeholder="e.g., 2.5">
                </div>

                <div class="form-group">
                    <label for="taskStatus">Status:</label>
                    <select id="taskStatus">
                        <option value="Completed">Completed</option>
                        <option value="Pending">Pending</option>
                    </select>
                </div>

                <button type="submit">Add Task</button>
            </form>
        </div>

        <!-- Analytics and Output Section -->
        <div class="card" style="flex: 2;">
            <h2>Productivity Summary</h2>
            
            <div class="metrics">
                <div class="metric-box">
                    <h3 id="totalTasks">0</h3>
                    <p>Total Tasks</p>
                </div>
                <div class="metric-box">
                    <h3 id="totalHours">0</h3>
                    <p>Hours Logged</p>
                </div>
                <div class="metric-box">
                    <h3 id="productivityScore">0%</h3>
                    <p>Productivity Score</p>
                </div>
            </div>

            <h2>Task Log</h2>
            <table>
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Hours</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="taskList">
                    <!-- Tasks will be inserted here via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Links to your external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
